<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="640" height="400" viewBox="0 0 640 400" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="640" height="400" rx="16" fill="#0e0e11"/>

  <!-- menu bar strip with the lit (needs-input) Warp icon -->
  <rect x="0" y="0" width="640" height="32" fill="#1a1a1e"/>
  <image x="556" y="6" width="20" height="20" xlink:href="data:image/png;base64,"/>
  <text x="582" y="21" fill="#e8e8ec" font-size="12.5" font-weight="600">2</text>
  <text x="22" y="21" fill="#5e5e66" font-size="12.5">●●●  Warp</text>
  <path d="M572 34 l8 8 l8 -8 z" fill="#26262b"/>

  <!-- dropdown -->
  <rect x="332" y="42" width="288" height="244" rx="13" fill="#26262b" stroke="#3a3a41" stroke-width="1"/>
  <text x="350" y="70" fill="#9aa0a6" font-size="11" letter-spacing="0.5">WARP AGENTS</text>

  <circle cx="354" cy="95" r="4.5" fill="#ff9f0a"/>
  <text x="370" y="99" fill="#ffb23e" font-size="13.5">deploy to prod?</text>
  <text x="604" y="99" fill="#7f7f87" font-size="12" text-anchor="end">1m</text>

  <circle cx="354" cy="127" r="4.5" fill="#34c759"/>
  <text x="370" y="131" fill="#4cd964" font-size="13.5">Integrate this plugin</text>
  <text x="604" y="131" fill="#7f7f87" font-size="12" text-anchor="end">3m</text>

  <circle cx="354" cy="159" r="4.5" fill="#9a9aa1"/>
  <text x="370" y="163" fill="#d6d6db" font-size="13.5">Migrate DB schema</text>
  <text x="604" y="163" fill="#7f7f87" font-size="12" text-anchor="end">12m</text>

  <line x1="346" y1="184" x2="606" y2="184" stroke="#3a3a41" stroke-width="1"/>
  <text x="350" y="210" fill="#c9c9ce" font-size="13">Очистить</text>
  <line x1="346" y1="230" x2="606" y2="230" stroke="#3a3a41" stroke-width="1"/>
  <text x="350" y="256" fill="#e8e8ec" font-size="13">Открыть Warp</text>

  <!-- legend: the four menu-bar states -->
  <text x="40" y="70" fill="#6e6e76" font-size="12.5" font-weight="700" letter-spacing="0.4">ИКОНКА В МЕНЮ-БАРЕ</text>
  <g>
    <image x="40"  y="92" width="30" height="30" xlink:href="data:image/png;base64,"/>
    <text x="82" y="111" fill="#9a9aa1" font-size="13">простой — нет агентов</text>
    <image x="40"  y="134" width="30" height="30" xlink:href="data:image/png;base64,"/>
    <text x="82" y="153" fill="#d6d6db" font-size="13">агент работает</text>
    <image x="40"  y="176" width="30" height="30" xlink:href="data:image/png;base64,"/>
    <text x="82" y="195" fill="#4cd964" font-size="13">закончил — ждёт тебя</text>
    <image x="40"  y="218" width="30" height="30" xlink:href="data:image/png;base64,"/>
    <text x="82" y="237" fill="#ffb23e" font-size="13">нужен твой ответ</text>
  </g>
  <text x="40" y="300" fill="#5e5e66" font-size="12">warpwatch · логотип Warp + статус-бейдж · клик → прыжок во вкладку</text>

<svg xmlns="http://www.w3.org/2000/svg" width="620" height="360" viewBox="0 0 620 360" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="620" height="360" rx="16" fill="#0e0e11"/>

  <!-- menu bar strip -->
  <rect x="0" y="0" width="620" height="32" fill="#1a1a1e"/>
  <text x="22" y="21" fill="#5e5e66" font-size="12.5">●●●  Warp</text>
  <!-- lit menu-bar item: bell + count -->
  <g transform="translate(545,8)">
    <path d="M8 1 C5 1 3.2 2.9 3.2 5.6 V9 L1.4 11.6 H14.6 L12.8 9 V5.6 C12.8 2.9 11 1 8 1 Z M8 16 C9 16 9.8 15.2 9.8 14.2 H6.2 C6.2 15.2 7 16 8 16 Z" fill="#ff9f0a"/>
    <circle cx="15" cy="3" r="6" fill="#ff453a"/>
    <text x="15" y="6.5" fill="#ffffff" font-size="9" font-weight="700" text-anchor="middle">2</text>
  </g>

  <!-- pointer -->
  <path d="M548 34 l8 8 l8 -8 z" fill="#26262b"/>

  <!-- dropdown panel -->
  <g>
    <rect x="318" y="42" width="284" height="252" rx="13" fill="#26262b" stroke="#3a3a41" stroke-width="1"/>

    <text x="336" y="70" fill="#7a7a82" font-size="11" letter-spacing="0.6">WARP AGENTS</text>

    <!-- row: needs input (orange) -->
    <circle cx="340" cy="96" r="4.5" fill="#ff9f0a"/>
    <text x="356" y="100" fill="#f2f2f5" font-size="13.5">Fix the flaky auth test</text>
    <text x="586" y="100" fill="#7a7a82" font-size="12" text-anchor="end">1m</text>

    <!-- row: finished (green) -->
    <circle cx="340" cy="128" r="4.5" fill="#34c759"/>
    <text x="356" y="132" fill="#f2f2f5" font-size="13.5">Integrate this plugin</text>
    <text x="586" y="132" fill="#7a7a82" font-size="12" text-anchor="end">3m</text>

    <!-- row: working (grey) -->
    <circle cx="340" cy="160" r="4.5" fill="#8e8e93"/>
    <text x="356" y="164" fill="#b8b8bf" font-size="13.5">Migrate DB schema</text>
    <text x="586" y="164" fill="#7a7a82" font-size="12" text-anchor="end">12m</text>

    <line x1="332" y1="186" x2="588" y2="186" stroke="#3a3a41" stroke-width="1"/>
    <text x="336" y="212" fill="#9a9aa2" font-size="13">Очистить</text>
    <line x1="332" y1="232" x2="588" y2="232" stroke="#3a3a41" stroke-width="1"/>
    <text x="336" y="258" fill="#f2f2f5" font-size="13">Открыть Warp</text>
  </g>

  <!-- legend: idle vs attention -->
  <text x="40" y="232" fill="#6e6e76" font-size="12.5" font-weight="600">Иконка в меню-баре</text>

  <g transform="translate(40,250)">
    <path d="M0 4 h13 v9 h-13 z M2 6 l3 2.5 l-3 2.5" fill="none" stroke="#8e8e93" stroke-width="1.4"/>
    <text x="24" y="13" fill="#8e8e93" font-size="12.5">всё работает — серая</text>
  </g>
  <g transform="translate(40,278)">
    <path d="M6.5 0 C4 0 2.6 1.6 2.6 3.9 V7 L1 9.3 H12 L10.4 7 V3.9 C10.4 1.6 9 0 6.5 0 Z" fill="#ff9f0a"/>
    <circle cx="12" cy="2" r="4.5" fill="#ff453a"/>
    <text x="24" y="11" fill="#ff9f0a" font-size="12.5">вкладка ждёт тебя — яркая</text>
  </g>

  <text x="40" y="324" fill="#5e5e66" font-size="12">warpwatch · клик по вкладке → прыжок в неё</text>
</svg>
